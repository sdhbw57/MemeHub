# Redis 配置说明
# 文件位置: redis/redis.conf

# 绑定地址 - 生产环境建议绑定内网IP
bind 127.0.0.1

# 端口
port 6379

# 后台运行
daemonize yes

# PID文件
pidfile /var/run/redis_6379.pid

# 日志级别
loglevel notice
logfile /var/log/redis/redis.log

# 数据库数量
databases 16

# 持久化 - RDB快照
save 900 1
save 300 10
save 60 10000

# RDB文件名
dbfilename dump.rdb

# 工作目录
dir /var/lib/redis

# 内存限制 (根据服务器配置调整)
maxmemory 256mb

# 内存淘汰策略 - 推荐使用 allkeys-lru
maxmemory-policy allkeys-lru

# 密码认证 (生产环境必须设置)
# requirepass your_strong_password_here

# 连接数限制
maxclients 10000

# TCP keepalive
tcp-keepalive 300

# 慢查询日志 (微秒)
slowlog-log-slower-than 10000
slowlog-max-len 128
