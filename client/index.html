<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图库 - 表情包图片站</title>
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <div class="header-main">
                <a href="/" class="logo">图库</a>
                
                <div class="search-wrapper">
                    <form id="searchForm" class="search-form">
                        <input type="text" id="searchInput" placeholder="搜索图片..." class="search-input">
                        <button type="submit" class="search-btn">→</button>
                    </form>
                </div>

                <button id="uploadBtn" class="upload-btn">上传图片</button>
            </div>

            <nav id="categoryNav" class="category-nav">
                <button class="category-btn active" data-id="">全部</button>
            </nav>
        </div>
    </header>

    <main class="main">
        <div id="imageGrid" class="image-grid"></div>

        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>加载中...</p>
        </div>

        <div id="pagination" class="pagination"></div>
    </main>

    <div id="uploadModal" class="modal-overlay hidden">
        <div class="modal-upload">
            <div class="modal-header">
                <h2 class="modal-title">上传图片</h2>
                <button id="closeUpload" class="close-btn">×</button>
            </div>
            
            <form id="uploadForm" class="upload-form">
                <div class="drop-zone" id="dropZone">
                    <input type="file" id="fileInput" accept="image/jpeg,image/png,image/gif,image/webp" class="hidden">
                    <div id="uploadPrompt">
                        <div class="upload-icon">+</div>
                        <p class="upload-text">点击或拖拽图片上传</p>
                        <p class="upload-hint">支持 JPG, PNG, GIF, WEBP (最大 5MB)</p>
                    </div>
                    <div id="filePreview" class="hidden">
                        <img class="preview-img">
                        <p class="preview-name"></p>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">分类</label>
                    <select id="uploadCategory" class="select-input"></select>
                </div>
                
                <button type="submit" class="submit-btn" id="submitBtn">上传</button>
                
                <div id="uploadProgress" class="progress-wrap hidden">
                    <div class="progress-track">
                        <div class="progress-bar" id="progressBar" style="width: 0%"></div>
                    </div>
                    <p class="progress-text" id="progressText">上传中...</p>
                </div>
            </form>
        </div>
    </div>

    <div id="detailModal" class="modal-overlay hidden">
        <div class="modal-detail">
            <div class="detail-content">
                <div class="detail-header">
                    <h2 id="detailTitle" class="detail-title"></h2>
                    <button id="closeDetail" class="close-btn">×</button>
                </div>
                
                <div class="detail-body">
                    <div class="detail-image">
                        <img id="detailImage" class="detail-img">
                    </div>
                    
                    <div class="detail-sidebar">
                        <div class="info-card">
                            <h3 class="info-title">图片信息</h3>
                            <div class="info-list">
                                <div class="info-row">
                                    <span class="info-label">分类</span>
                                    <span class="info-value" id="detailCategory">-</span>
                                </div>
                                <div class="info-row">
                                    <span class="info-label">尺寸</span>
                                    <span class="info-value" id="detailSize">-</span>
                                </div>
                                <div class="info-row">
                                    <span class="info-label">大小</span>
                                    <span class="info-value" id="detailFileSize">-</span>
                                </div>
                                <div class="info-row">
                                    <span class="info-label">上传时间</span>
                                    <span class="info-value" id="detailTime">-</span>
                                </div>
                                <div class="info-row">
                                    <span class="info-label">浏览</span>
                                    <span class="info-value" id="detailViews">-</span>
                                </div>
                            </div>
                        </div>
                        
                        <div class="share-card">
                            <h3 class="share-title">分享链接</h3>
                            <div class="share-list">
                                <div class="share-item">
                                    <label class="share-label">直链</label>
                                    <div class="share-row">
                                        <input id="shareDirect" readonly class="share-input">
                                        <button class="copy-btn" data-target="shareDirect">复制</button>
                                    </div>
                                </div>
                                <div class="share-item">
                                    <label class="share-label">Markdown</label>
                                    <div class="share-row">
                                        <input id="shareMarkdown" readonly class="share-input">
                                        <button class="copy-btn" data-target="shareMarkdown">复制</button>
                                    </div>
                                </div>
                                <div class="share-item">
                                    <label class="share-label">HTML</label>
                                    <div class="share-row">
                                        <input id="shareHtml" readonly class="share-input">
                                        <button class="copy-btn" data-target="shareHtml">复制</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="js/app.js"></script>
</body>
</html>
